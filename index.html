<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>✰ Cadence's Site! ✰</title>
        <style>
            /* fixes issues with margins */
            body {
                margin: 0;
                padding: 5%;
                padding-top: 10px;
            }

            .header {
                padding-bottom: 20px;
                text-align: center;
            }

            /* transforms list into more of a grid-like element */
            ul.garden {
                list-style-type: none;
                margin: 0;
            }

            div.garden {
                text-align: center;
                width: 85%;
                margin: auto;
                padding: 10px;
                background-image: url(https://img.itch.zone/aW1hZ2UvMTg4NDQzNS8xMTA3MjYxNS5wbmc=/original/bVer6e.png);
            }

            li {
                display: inline;
            }

            /* procedurally attaches tree img to img tags labelled "tree" */
            .flower {
                width: 13%;
                content: url(https://www.pngarts.com/files/10/Dry-Flowers-PNG-Transparent-Image.png);
            }

            .shrub {
                width: 13%;
                content: url(https://www.freeiconspng.com/uploads/shrub-bushes-png-0.png);
            }

            .worm {
                width: 13%;
                content: url(https://static.vecteezy.com/system/resources/previews/053/408/620/non_2x/top-view-of-worm-on-transparent-background-free-png.png);
            }
        </style>
    </head>
    <body>
        <div class="header">
            <!-- title/header -->
            <h1>
                Welcome to<br>
                ✰ Cadence's Weird Garden! ✰
            </h1>
            <p>
                My weird garden is... shrinking?
            </p>
        </div>
        <div class="garden">
            <!-- grid of flowers -->
            <ul class="garden">
                <li><img class="shrub"></li>
                <li><img class="flower"></li>
                <li><img class="worm"></li>
                <li><img class="shrub"></li>
                <li><img class="flower"></li>
                <li>it's getting crowded in here!!</li>
                <li><img class="shrub"></li>
                <li><img class="flower"></li>
                <li><img class="flower"></li>
                <li><img class="worm"></li>
                <li><img class="shrub"></li>
                <li><img class="worm"></li>
                <li><img class="flower"></li>
                <li><img class="shrub"></li>
                <li><img class="worm"></li>
                <li><img class="shrub"></li>
                <li><img class="flower"></li>
                <li><img class="flower"></li>
                <li><img class="worm"></li>
                <li><img class="flower"></li>
            </ul>
        </div>
    </body>
</html>
