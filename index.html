<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>✰ Cadence's Site! ✰</title>
        <style>
            /* fixes issues with margins */
            body {
                margin: 0;
                padding: 5%;
                padding-top: 10px;
            }

            .header {
                padding-bottom: 20px;
                text-align: center;
            }

            /* transforms list into more of a grid-like element */
            ul.garden {
                list-style-type: none;
                margin: 0;
            }

            div.garden {
                text-align: center;
                padding: 10px;
                background-image: url(https://img.itch.zone/aW1hZ2UvMTg4NDQzNS8xMTA3MjYxNS5wbmc=/original/bVer6e.png);
            }

            li {
                display: inline;
                text-align: center;
                
                padding-left: 10px;
            }

            /* procedurally attaches tree img to img tags labelled "tree" */
            .tree {
                width: 200px;
                content: url(https://upload.wikimedia.org/wikipedia/commons/b/bf/Tree_Transparent_Background.png);
            }
        </style>
    </head>
    <body>
        <div class="header">
            <!-- title/header -->
            <h1>
                Welcome to<br>
                ✰ Cadence's Weird Garden! ✰
            </h1>
            <p>
                The start of my weird garden!
            </p>
        </div>
        <div class="garden">
            <!-- grid of trees -->
            <ul class="garden">
                <li><img class="tree"></li>
                <li><img class="tree"></li>
                <li><img class="tree"></li>
                <li><img class="tree"></li>
                <li><img class="tree"></li>
                <li><img class="tree"></li>
                <li><img class="tree"></li>
                <li><img class="tree"></li>
                <li><img class="tree"></li>
                <li>do trees count as a garden? :/</li>

                <br>

                <li><img class="tree"></li>
                <li><img class="tree"></li>
                <li><img class="tree"></li>
                <li><img class="tree"></li>
                <li><img class="tree"></li>
            </ul>
        </div>
    </body>
</html>
